workers:
  codex_count: 5
  count: 5

worktree:
  enabled: true
  default_base: ""
  branch_prefix: "yamibaito"

codex:
  sandbox: workspace-write
  approval: on-request
  model: default
  web_search: false

policies:
  tests: none
  shared_files: warn
  constraints_level: loose

quality_gate:
  enabled: true
  max_rework_loops: 3
  reviewer_persona: qa_engineer
  require_different_reviewer: true
  checklist_template_path: ".yamibaito/templates/review-checklist.yaml"

agents:
  oyabun:
    cli: claude
    # model: opus        # optional: --model opus を CLI に渡す
  waka:
    cli: claude
    # model: sonnet      # optional: --model sonnet を CLI に渡す
  worker:
    cli: codex
    sandbox: workspace-write
    approval: on-request
    # model: o3          # optional: --model o3 を CLI に渡す（未指定時は CLI デフォルト）
    web_search: false
  plan:
    cli: claude
  plan_review:
    cli: codex
  # review:              # 未設定時は worker と同じ CLI を使用
  #   cli: claude        # 実装と別の CLI でクロスレビュー
  #   model: sonnet      # レビュー用に別モデルを指定可能
